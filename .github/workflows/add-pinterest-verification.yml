name: One-time Pinterest verification

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Pinterest verification tag
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          tag = '  <meta name="p:domain_verify" content="373c9438de98d4055bed395a0aca6b87">'
          anchor = '  <meta name="google-site-verification" content="3lWCCEf44x6k8HCtnCnUIT6Yq9rmfZUGEID5cFMAbwE">'

          if tag not in text:
              if anchor not in text:
                  raise SystemExit("Google verification anchor not found")
              text = text.replace(anchor, anchor + "\n" + tag, 1)
              path.write_text(text, encoding="utf-8")

          Path(".github/workflows/add-pinterest-verification.yml").unlink(missing_ok=True)
          PY

      - name: Commit verification tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git commit -m "Add Pinterest domain verification tag"
          git push
